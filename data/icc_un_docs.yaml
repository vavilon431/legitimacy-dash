  - id: venice-commission-russia-constitution-2021
    issuer: CoE
    doc_type: judgment
    date: "2021-03-23"
    target_actor: putin
    title_uk: "Висновок Венеціанської комісії CDL-AD(2021)005 щодо поправок до Конституції РФ"
    title_en: "Venice Commission Opinion CDL-AD(2021)005 on Russian constitutional amendments"
    summary_uk: "Комісія критикує і процедуру (відсутність належного обговорення, голосування одним пакетом), і зміст: 'обнулення' попередніх термінів Путіна, верховенство російського законодавства над міжнародним, посилення повноважень президента — все це 'не відповідає європейським стандартам' і 'значно порушує баланс гілок влади'."
    summary_en: "The Commission criticises both procedure (lack of proper debate, single-package vote) and substance: 'resetting' Putin's previous terms, primacy of Russian law over international law, expansion of presidential powers — all 'do not conform to European standards' and 'significantly disturb the balance between branches of power'."
    source_url: "https://www.venice.coe.int/webforms/documents/default.aspx?pdffile=CDL-AD(2021)005-e"
    impact: negative_to_target
