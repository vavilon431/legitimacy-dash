# country_status.yaml — позиція кожної держави щодо ключових індикаторів
# міжнародного визнання осі B.
#
# Принцип: default = "yes" по голосуваннях ES-11/1 і ES-11/4 (бо за резолюції
# 141 і 143 держав відповідно). Тут перелічуємо ЛИШЕ країни з ВІДМІННИМ від
# yes статусом + країни-санкційники проти Путіна особисто.
#
# Поля:
#   iso3            — ISO 3166-1 alpha-3 (або ADM0_A3 для дискусійних).
#   name_uk/en      — людська назва (для tooltip/sidebar).
#   vote_es111      — "yes" | "abstain" | "no" | "absent" — UN GA, 2022-03-02.
#                     Резолюція 'Aggression against Ukraine' (141:5:35, 12 absent).
#   vote_es114      — "yes" | "abstain" | "no" | "absent" — UN GA, 2022-10-12.
#                     Резолюція по невизнанню анексії (143:5:35, 10 absent).
#   icc_rome_statute — true/false — учасник Римського статуту (юр. обов'язок
#                      виконати ордер ICC проти Путіна).
#   putin_personal_sanctions — true/false — персональні санкції проти В. Путіна.
#
# Джерела: digitallibrary.un.org (резолюції ES-11/1, ES-11/4),
#          asp.icc-cpi.int (Rome Statute parties),
#          національні sanctions trackers (OFAC, EU, OFSI, тощо).

